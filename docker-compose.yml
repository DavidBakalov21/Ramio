# Code runners: backend spawns `docker run`. On EC2/Compose you need:
# 1) Docker CLI in the backend image (see backend-ramio/Dockerfile)
# 2) Host Docker socket in the container
# 3) Host bind-mount for temp workspaces so the daemon can mount the same paths (see TMPDIR)
#
# On the host (once):   sudo mkdir -p /opt/ramio-runner-work && sudo chown 1000:1000 /opt/ramio-runner-work
# Docker socket group:  getent group docker | cut -d: -f3   → set DOCKER_GID in .env if not 988

services:
  backend1:
    user: "1000:1000"
    image: ramio-backend:local
    build:
      context: ./backend-ramio
      dockerfile: Dockerfile
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3333:3333"
    restart: unless-stopped

  backend2:
    user: "1000:1000"
    image: ramio-backend:local
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3334:3333"
    restart: unless-stopped

  backend3:
    user: "1000:1000"
    image: ramio-backend:local
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3335:3333"
    restart: unless-stopped

  frontend1:
    user: "1000:1000"
    image: ramio-frontend:local
    build:
      context: ./frontend-ramio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://ramio-lms.com/api}"
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  frontend2:
    user: "1000:1000"
    image: ramio-frontend:local
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  frontend3:
    user: "1000:1000"
    image: ramio-frontend:local
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped
