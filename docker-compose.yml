# Code runners: backend spawns `docker run` on the *host* daemon. On EC2/Compose you need:
# 1) Docker CLI in the backend image (see backend-ramio/Dockerfile)
# 2) Host Docker socket in the container
# 3) A *host bind-mount* (not a named volume) for runner temp dirs so the host daemon can
#    resolve the path when it spawns runner containers. Create it once on the host:
#      sudo mkdir -p /opt/ramio-runner-work && sudo chown 1000:1000 /opt/ramio-runner-work
#    docker-entrypoint.sh chowns the dir on every start as a safety net.
# 4) Runner images: Python/Java use public Hub images (no local build needed).
#    .NET (xUnit cache) and Node (Jest) require custom images — build once on the server:
#      docker compose --profile runners build runner-dotnet runner-node
#    Optional overrides: RUNNER_PYTHON_IMAGE, RUNNER_DOTNET_IMAGE, etc. in backend .env

services:
  backend1:
    image: ramio-backend:local
    build:
      context: ./backend-ramio
      dockerfile: Dockerfile
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
      DOCKER_GID: "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3333:3333"
    restart: unless-stopped

  backend2:
    image: ramio-backend:local
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
      DOCKER_GID: "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3334:3333"
    restart: unless-stopped

  backend3:
    image: ramio-backend:local
    env_file:
      - ./backend-ramio/.env
    environment:
      TMPDIR: /opt/ramio-runner-work
      DOCKER_GID: "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ramio-runner-work:/opt/ramio-runner-work
    shm_size: "1gb"
    ports:
      - "127.0.0.1:3335:3333"
    restart: unless-stopped

  # Optional local runners (non-root user in image). Default app images are public pulls; Node needs Jest here.
  runner-python:
    profiles: ["runners"]
    image: runner-python:3.12
    build:
      context: .
      dockerfile: runners/python/Dockerfile.python

  runner-node:
    profiles: ["runners"]
    image: runner-node:20
    build:
      context: .
      dockerfile: runners/node/Dockerfile.node

  runner-java:
    profiles: ["runners"]
    image: runner-java:21
    build:
      context: .
      dockerfile: runners/java/Dockerfile.java

  runner-dotnet:
    profiles: ["runners"]
    image: runner-dotnet:8.0
    build:
      context: .
      dockerfile: runners/dotnet/Dockerfile.dotnet

  frontend1:
    user: "1000:1000"
    image: ramio-frontend:local
    build:
      context: ./frontend-ramio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://ramio-lms.com/api}"
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  frontend2:
    user: "1000:1000"
    image: ramio-frontend:local
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  frontend3:
    user: "1000:1000"
    image: ramio-frontend:local
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped
