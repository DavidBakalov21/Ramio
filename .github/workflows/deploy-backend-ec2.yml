name: Deploy App to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
      - "docker-compose.yml"
      - "nginx/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deployment on EC2 through SSM
        id: start
        run: |
          set -euo pipefail
          COMMANDS_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            '[
              "set -eux",
              "export DEBIAN_FRONTEND=noninteractive",
              ("sudo -u ubuntu test -d \"" + $app + "/.git\" || sudo -u ubuntu git clone --depth 1 --branch " + $branch + " \"" + $repo + "\" \"" + $app + "\""),
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && git fetch origin " + $branch + " && git reset --hard origin/" + $branch + "\""),
              "apt-get update -y",
              "apt-get install -y nginx docker.io docker-compose-v2",
              "systemctl enable docker nginx || true",
              "systemctl start docker",
              "docker info",
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && docker compose pull > /tmp/ramio-compose-pull.log 2>&1 || true; tail -40 /tmp/ramio-compose-pull.log || true\""),
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && docker compose up -d --build --remove-orphans > /tmp/ramio-compose-up.log 2>&1; ec=$?; tail -200 /tmp/ramio-compose-up.log; exit $ec\""),
              ("install -m 644 \"" + $app + "/nginx/default.conf\" /etc/nginx/sites-available/default"),
              "ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default",
              "nginx -t",
              "systemctl reload nginx",
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && docker compose ps\"")
            ]')"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy full app from GitHub Actions" \
            --timeout-seconds 7200 \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          # aws ssm wait command-executed only polls ~100s; builds can take longer.
          deadline=$((SECONDS + 7000))
          while [ $SECONDS -lt "$deadline" ]; do
            status="$(aws ssm get-command-invocation \
              --command-id "${{ steps.start.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query Status \
              --output text)"
            case "$status" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut|ExecutionTimedOut) exit 1 ;;
              *) sleep 15 ;;
            esac
          done
          echo "Timed out waiting for SSM after ~7000s" >&2
          exit 1

      - name: Print command output
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json
