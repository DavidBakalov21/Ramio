name: Deploy App to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on EC2 (SSM sync, launch, poll)
        id: deploy
        run: |
          set -uo pipefail
          instance_id="${{ secrets.EC2_INSTANCE_ID }}"
          app_dir="${APP_DIR}"

          dump_invocation() {
            local cid="$1"
            local label="$2"
            echo "---- ${label} stderr ----" >&2
            aws ssm get-command-invocation \
              --command-id "$cid" \
              --instance-id "$instance_id" \
              --query StandardErrorContent \
              --output text 2>/dev/null | tail -c 32000 >&2 || true
            echo "---- ${label} stdout ----" >&2
            aws ssm get-command-invocation \
              --command-id "$cid" \
              --instance-id "$instance_id" \
              --query StandardOutputContent \
              --output text 2>/dev/null | tail -c 32000 >&2 || true
          }

          wait_one_ssm() {
            local cid="$1"
            local max_attempts="${2:-180}"
            local i=0
            while [ "$i" -lt "$max_attempts" ]; do
              set +e
              st="$(aws ssm get-command-invocation \
                --command-id "$cid" \
                --instance-id "$instance_id" \
                --query Status \
                --output text 2>/dev/null)"
              aws_ec=$?
              set -u
              if [ "$aws_ec" -ne 0 ]; then
                sleep 2
                i=$((i + 1))
                continue
              fi
              st="$(echo "$st" | tr -d '\r')"
              case "$st" in
                Success) return 0 ;;
                Failed|Cancelled|TimedOut|ExecutionTimedOut|Undeliverable|Terminated)
                  echo "SSM command ${cid} ended: ${st}" >&2
                  return 1
                  ;;
              esac
              sleep 2
              i=$((i + 1))
            done
            echo "Timed out waiting for SSM command ${cid}" >&2
            return 1
          }

          set -euo pipefail
          SYNC_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            -f .github/scripts/ssm-deploy-sync.jq)"
          sync_id="$(aws ssm send-command \
            --instance-ids "$instance_id" \
            --document-name "AWS-RunShellScript" \
            --comment "Ramio: git sync on EC2" \
            --timeout-seconds 3600 \
            --parameters "commands=${SYNC_JSON}" \
            --query Command.CommandId \
            --output text)"
          echo "sync_id=${sync_id}" >> "$GITHUB_OUTPUT"

          set +e
          echo "Waiting for git sync SSM (up to ~1h)..."
          wait_one_ssm "$sync_id" 1800
          sync_rc=$?
          set -e
          if [ "$sync_rc" -ne 0 ]; then
            dump_invocation "$sync_id" "git sync"
            exit 1
          fi

          LAUNCH_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            -f .github/scripts/ssm-deploy-launch.jq)"
          launch_id="$(aws ssm send-command \
            --instance-ids "$instance_id" \
            --document-name "AWS-RunShellScript" \
            --comment "Ramio: start background deploy" \
            --timeout-seconds 300 \
            --parameters "commands=${LAUNCH_JSON}" \
            --query Command.CommandId \
            --output text)"
          echo "launch_id=${launch_id}" >> "$GITHUB_OUTPUT"

          set +e
          echo "Waiting for launch SSM..."
          wait_one_ssm "$launch_id" 300
          launch_rc=$?
          set -e
          if [ "$launch_rc" -ne 0 ]; then
            dump_invocation "$launch_id" "launch"
            exit 1
          fi

          set +u
          deadline=$(( $(date +%s) + 7200 ))
          echo "Polling ${app_dir}/.deploy-status until SUCCESS or FAILED..."

          while [ "$(date +%s)" -lt "$deadline" ]; do
            poll_commands="$(jq -n \
              --arg cmd "sudo cat ${app_dir}/.deploy-status 2>/dev/null || echo MISSING" \
              '[ $cmd ]')"
            poll_id="$(aws ssm send-command \
              --instance-ids "$instance_id" \
              --document-name "AWS-RunShellScript" \
              --timeout-seconds 120 \
              --parameters "commands=${poll_commands}" \
              --comment "Poll Ramio deploy status" \
              --query Command.CommandId \
              --output text)"

            wait_one_ssm "$poll_id" 120 || exit 1

            body="$(aws ssm get-command-invocation \
              --command-id "$poll_id" \
              --instance-id "$instance_id" \
              --query StandardOutputContent \
              --output text 2>/dev/null | tr -d '\r\n')"

            case "$body" in
              SUCCESS)
                echo "Deploy status on instance: SUCCESS"
                exit 0
                ;;
              FAILED)
                echo "Deploy status on instance: FAILED" >&2
                exit 1
                ;;
              *)
                echo "Deploy status: ${body:-MISSING} ($(date -u +%H:%M:%SZ))"
                sleep 15
                ;;
            esac
          done

          echo "Timed out waiting for ${app_dir}/.deploy-status" >&2
          exit 1

      - name: Print SSM git sync output
        if: always() && steps.deploy.outputs.sync_id != ''
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.sync_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json

      - name: Print SSM launch output
        if: always() && steps.deploy.outputs.launch_id != ''
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.launch_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json

      - name: Print EC2 deploy log tail
        if: always()
        run: |
          set -euo pipefail
          log_commands="$(jq -n \
            --arg cmd 'sudo tail -n 500 /tmp/ramio-deploy.log 2>/dev/null || echo no-deploy-log' \
            '[ $cmd ]')"
          cid="$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters "commands=${log_commands}" \
            --comment "Fetch Ramio deploy log" \
            --query Command.CommandId \
            --output text)"
          for i in $(seq 1 90); do
            st="$(aws ssm get-command-invocation --command-id "$cid" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)"
            case "$st" in Success|Failed|Cancelled|TimedOut|ExecutionTimedOut) break ;; esac
            sleep 2
          done
          aws ssm get-command-invocation \
            --command-id "$cid" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent}" \
            --output json
