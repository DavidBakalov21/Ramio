name: Deploy App to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deployment on EC2 through SSM
        id: start
        run: |
          set -euo pipefail
          COMMANDS_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            -f .github/scripts/ssm-deploy-commands.jq)"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy full app from GitHub Actions" \
            --timeout-seconds 7200 \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for SSM command
        run: |
          set -uo pipefail
          # Match send-command --timeout-seconds (7200). Do not use `set -e` here:
          # get-command-invocation often errors briefly right after send-command.
          start_ts="$(date +%s)"
          timeout_sec=7200
          command_id="${{ steps.start.outputs.command_id }}"
          instance_id="${{ secrets.EC2_INSTANCE_ID }}"
          while true; do
            now="$(date +%s)"
            elapsed=$((now - start_ts))
            if [ "$elapsed" -ge "$timeout_sec" ]; then
              echo "Timed out waiting for SSM after ${timeout_sec}s" >&2
              exit 1
            fi
            set +e
            status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --query Status \
              --output text 2>/dev/null)"
            aws_ec=$?
            set -u
            if [ "$aws_ec" -ne 0 ]; then
              echo "SSM poll not ready yet (${elapsed}s), aws exit ${aws_ec}" >&2
              sleep 5
              continue
            fi
            status="$(echo "$status" | tr -d '\r')"
            case "$status" in
              Success)
                echo "SSM finished: Success (${elapsed}s)"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|ExecutionTimedOut|Undeliverable|Terminated)
                echo "SSM finished: ${status} (${elapsed}s)" >&2
                echo "---- SSM stdout (last 24k) ----" >&2
                aws ssm get-command-invocation \
                  --command-id "$command_id" \
                  --instance-id "$instance_id" \
                  --query StandardOutputContent \
                  --output text 2>/dev/null | tail -c 24000 >&2 || true
                echo "---- SSM stderr (last 24k) ----" >&2
                aws ssm get-command-invocation \
                  --command-id "$command_id" \
                  --instance-id "$instance_id" \
                  --query StandardErrorContent \
                  --output text 2>/dev/null | tail -c 24000 >&2 || true
                exit 1
                ;;
              Pending|InProgress|Delayed|Cancelling)
                echo "SSM status: ${status} (${elapsed}s)"
                sleep 15
                ;;
              "")
                echo "SSM empty status, retrying (${elapsed}s)" >&2
                sleep 5
                ;;
              *)
                echo "SSM status (unexpected): ${status} (${elapsed}s)"
                sleep 15
                ;;
            esac
          done

      - name: Print command output
        if: always() && steps.start.outputs.command_id != ''
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json
