name: Deploy Backend to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deployment on EC2 through SSM
        id: start
        run: |
          set -euo pipefail
          # Load nvm if present. Use absolute paths only—no $HOME/$PATH here: SSM runs under /bin/sh with
          # set -u and often HOME unset, so $HOME inside bash -lc "..." is expanded by the outer shell before sudo.
          PRELUDE='export NVM_DIR=/home/ubuntu/.nvm; [ -s /home/ubuntu/.nvm/nvm.sh ] && . /home/ubuntu/.nvm/nvm.sh; export PATH=/usr/local/bin:/usr/bin:/bin'
          COMMANDS_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            --arg prelude "${PRELUDE}" \
            '[
              "set -eu",
              ("sudo -u ubuntu test -d \"" + $app + "/.git\" || sudo -u ubuntu git clone --depth 1 --branch " + $branch + " \"" + $repo + "\" \"" + $app + "\""),
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && git fetch origin " + $branch + " && git reset --hard origin/" + $branch + "\""),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; cd \\\"" + $app + "/backend-ramio\\\" && npm ci\""),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; cd \\\"" + $app + "/backend-ramio\\\" && npx prisma generate\""),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; cd \\\"" + $app + "/backend-ramio\\\" && npx prisma migrate deploy\""),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; cd \\\"" + $app + "/backend-ramio\\\" && npm run build\""),
              ("if ! sudo -u ubuntu bash -lc \"" + $prelude + "; command -v pm2 >/dev/null 2>&1\"; then sudo npm install -g pm2; fi"),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; if pm2 describe ramio-backend >/dev/null 2>&1; then pm2 restart ramio-backend --update-env; else pm2 start npm --name ramio-backend -- run start:prod; fi\""),
              ("sudo -u ubuntu bash -lc \"" + $prelude + "; pm2 save\"")
            ]')"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend from GitHub Actions" \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          aws ssm wait command-executed \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Print command output
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json
