name: Deploy App to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
      - "docker-compose.yml"
      - "nginx/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deployment on EC2 through SSM
        id: start
        run: |
          set -euo pipefail
          COMMANDS_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            '[
              "set -eu",
              "export DEBIAN_FRONTEND=noninteractive",
              ("sudo -u ubuntu test -d \"" + $app + "/.git\" || sudo -u ubuntu git clone --depth 1 --branch " + $branch + " \"" + $repo + "\" \"" + $app + "\""),
              ("sudo -u ubuntu bash -lc \"cd \\\"" + $app + "\\\" && git fetch origin " + $branch + " && git reset --hard origin/" + $branch + "\""),
              "if ! command -v docker >/dev/null 2>&1; then apt-get update && apt-get install -y docker.io docker-compose-plugin; fi",
              "if ! docker compose version >/dev/null 2>&1; then apt-get update && apt-get install -y docker-compose-plugin; fi",
              "systemctl enable docker || true",
              "systemctl start docker",
              ("cd \"" + $app + "\" && docker compose pull || true"),
              ("cd \"" + $app + "\" && docker compose up -d --build --remove-orphans"),
              ("install -m 644 \"" + $app + "/nginx/default.conf\" /etc/nginx/sites-available/default"),
              "nginx -t",
              "systemctl reload nginx",
              ("cd \"" + $app + "\" && docker compose ps")
            ]')"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy full app from GitHub Actions" \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          aws ssm wait command-executed \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Print command output
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json
