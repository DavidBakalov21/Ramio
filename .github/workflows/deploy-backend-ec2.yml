name: Deploy App to EC2

on:
  push:
    branches:
      - master
    paths:
      - "backend-ramio/**"
      - ".github/workflows/deploy-backend-ec2.yml"
      - "frontend-ramio/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/scripts/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      APP_DIR: /home/ubuntu/Ramio
      BRANCH: master
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deployment on EC2 through SSM
        id: start
        run: |
          set -euo pipefail
          COMMANDS_JSON="$(jq -n \
            --arg app "${APP_DIR}" \
            --arg branch "${BRANCH}" \
            --arg repo "${REPO_URL}" \
            -f .github/scripts/ssm-deploy-start.jq)"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Start background deploy on EC2" \
            --timeout-seconds 600 \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Started SSM bootstrap: ${COMMAND_ID}"

      - name: Wait for bootstrap SSM + poll deploy status
        run: |
          set -uo pipefail
          instance_id="${{ secrets.EC2_INSTANCE_ID }}"
          app_dir="${APP_DIR}"

          wait_one_ssm() {
            local cid="$1"
            local i=0
            while [ "$i" -lt 180 ]; do
              set +e
              st="$(aws ssm get-command-invocation \
                --command-id "$cid" \
                --instance-id "$instance_id" \
                --query Status \
                --output text 2>/dev/null)"
              aws_ec=$?
              set -u
              if [ "$aws_ec" -ne 0 ]; then
                sleep 2
                i=$((i + 1))
                continue
              fi
              st="$(echo "$st" | tr -d '\r')"
              case "$st" in
                Success) return 0 ;;
                Failed|Cancelled|TimedOut|ExecutionTimedOut|Undeliverable|Terminated)
                  echo "SSM command ${cid} ended: ${st}" >&2
                  return 1
                  ;;
              esac
              sleep 2
              i=$((i + 1))
            done
            echo "Timed out waiting for SSM command ${cid}" >&2
            return 1
          }

          echo "Waiting for bootstrap command..."
          wait_one_ssm "${{ steps.start.outputs.command_id }}" || exit 1

          deadline=$(( $(date +%s) + 7200 ))
          echo "Polling ${app_dir}/.deploy-status until SUCCESS or FAILED..."

          while [ "$(date +%s)" -lt "$deadline" ]; do
            poll_commands="$(jq -n \
              --arg cmd "sudo cat ${app_dir}/.deploy-status 2>/dev/null || echo MISSING" \
              '[ $cmd ]')"
            poll_id="$(aws ssm send-command \
              --instance-ids "$instance_id" \
              --document-name "AWS-RunShellScript" \
              --timeout-seconds 120 \
              --parameters "commands=${poll_commands}" \
              --comment "Poll Ramio deploy status" \
              --query Command.CommandId \
              --output text)"

            wait_one_ssm "$poll_id" || exit 1

            body="$(aws ssm get-command-invocation \
              --command-id "$poll_id" \
              --instance-id "$instance_id" \
              --query StandardOutputContent \
              --output text 2>/dev/null | tr -d '\r\n')"

            case "$body" in
              SUCCESS)
                echo "Deploy status on instance: SUCCESS"
                exit 0
                ;;
              FAILED)
                echo "Deploy status on instance: FAILED" >&2
                exit 1
                ;;
              *)
                echo "Deploy status: ${body:-MISSING} ($(date -u +%H:%M:%SZ))"
                sleep 15
                ;;
            esac
          done

          echo "Timed out waiting for ${app_dir}/.deploy-status" >&2
          exit 1

      - name: Print SSM bootstrap output
        if: always() && steps.start.outputs.command_id != ''
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.start.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}" \
            --output json

      - name: Print EC2 deploy log tail
        if: always()
        run: |
          set -euo pipefail
          log_commands="$(jq -n \
            --arg cmd 'sudo tail -n 500 /tmp/ramio-deploy.log 2>/dev/null || echo no-deploy-log' \
            '[ $cmd ]')"
          cid="$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters "commands=${log_commands}" \
            --comment "Fetch Ramio deploy log" \
            --query Command.CommandId \
            --output text)"
          for i in $(seq 1 90); do
            st="$(aws ssm get-command-invocation --command-id "$cid" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)"
            case "$st" in Success|Failed|Cancelled|TimedOut|ExecutionTimedOut) break ;; esac
            sleep 2
          done
          aws ssm get-command-invocation \
            --command-id "$cid" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status,stdout:StandardOutputContent}" \
            --output json
